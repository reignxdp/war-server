here<div style="position:fixed; bottom:0; width:100%; background:#333; color:#fff; padding:5px;">
  <input id="chatInput" type="text" placeholder="Mesaj yaz..." style="width:80%;">
  <button id="sendBtn">Gönder</button>
  <div id="chatLog" style="height:100px; overflow-y:auto; background:#111; margin-top:5px; padding:5px;"></div>
</div>

<script>
const input = document.getElementById("chatInput");
const btn = document.getElementById("sendBtn");
const log = document.getElementById("chatLog");

btn.addEventListener("click", () => {
  const msg = input.value;
  if(msg) {
    socket.emit("chatMessage", msg);
    input.value = "";
  }
});

socket.on("chatMessage", (data) => {
  const el = document.createElement("div");
  el.textContent = `${data.id}: ${data.message}`;
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
});
</script>
